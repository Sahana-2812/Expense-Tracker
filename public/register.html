<!DOCTYPE html>
<html>

<head>

<title>
Register
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body class="auth-body">

<div class="auth-box">

<h1>
Create Account
</h1>

<input
type="text"
placeholder="Full Name">

<input
type="email"
placeholder="Email">

<input
type="password"
placeholder="Password">

<button onclick="register()">
Register
</button>

<br><br>

<p>
Already have account?
<a href="index.html">
Login
</a>
</p>

</div>

<script>

function register(){

  alert(
    "Registration Successful"
  );

  window.location.href =
  "index.html";

}

</script>

</body>
</html>
