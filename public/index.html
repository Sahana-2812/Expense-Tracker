<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#050816;
    font-family:Segoe UI;
}

.login-box{
    background:#121c42;
    padding:40px;
    border-radius:20px;
    width:350px;
}

h1{
    color:white;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:none;
    border-radius:12px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4f6df5;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#6b84ff;
}

</style>

</head>

<body>

<div class="login-box">

    <h1>Expense Tracker</h1>

    <input
    type="email"
    id="email"
    placeholder="Email">

    <input
    type="password"
    id="password"
    placeholder="Password">

    <button onclick="login()">
        Login
    </button>
    <p class="register-text">
Don't have an account?
<a href="register.html">
Register
</a>
</p>

</div>

<script>

function login(){

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    if(email && password){

        localStorage.setItem("loggedIn","true");

        window.location.href =
        "dashboard.html";
    }

    else{

        alert("Enter login details");
    }
}

</script>

</body>

</html>
